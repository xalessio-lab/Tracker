name: Invio Quotazioni Giornaliere

on:
  schedule:
    # L'orario è in UTC. 
    # Per le 09:00 italiane (ora solare), imposta 08:00.
    # Per le 09:00 italiane (ora legale), imposta 07:00.
    - cron: '0 8 * * *' 
  workflow_dispatch: # Ti permette di avviare il bot manualmente per testarlo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v3

      - name: Configurazione Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Installazione dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Esecuzione script tracker
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tracker.py